version: 2.1

orbs:
  android: circleci/android@2.3.0

jobs:
  build:
    executor:
      name: android/android-docker
      tag: 2023.08.1
      resource-class: medium
    
    steps:
      - checkout
      
      - restore_cache:
          key: gradle-v1-{{ checksum "build.gradle" }}-{{ checksum "app/build.gradle" }}
      
      - run:
          name: Enable Gradle Wrapper
          command: chmod +x gradlew
      
      - run:
          name: Run Build
          command: ./gradlew clean assembleRelease
      
      - save_cache:
          key: gradle-v1-{{ checksum "build.gradle" }}-{{ checksum "app/build.gradle" }}
          paths:
            - ~/.gradle
            - /usr/local/android-sdk
      
      - store_artifacts:
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          destination: AeroVPN-release.apk
      
      - store_artifacts:
          path: app/build/outputs/apk/release/
          destination: apk-release
      
      - persist_to_workspace:
          root: app/build/outputs/apk/release/
          paths:
            - "*.apk"
  
  release:
    executor:
      name: android/android-docker
      tag: 2023.08.1
      resource-class: medium
    
    steps:
      - checkout
      
      - attach_workspace:
          at: /tmp/apk
      
      - run:
          name: Install GitHub CLI
          command: |
            sudo apt-get update
            sudo apt-get install -y gh
      
      - run:
          name: Create GitHub Release
          command: |
            export VERSION=$(git describe --tags --always || echo "dev")
            gh release create "$VERSION" /tmp/apk/*.apk \
              --title "Release $VERSION" \
              --generate-notes \
              --draft
        when: on_success

workflows:
  build-and-release:
    jobs:
      - build
      - release:
          requires:
            - build
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/